name: Daily Fish Price Scrape & Retrain

on:
  schedule:
    - cron: '30 23 * * *'  # 23:30 UTC = 5:00 AM Sri Lanka Time (next day)
  workflow_dispatch:      # Allows manual triggering

jobs:
  scrape_and_retrain:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Scrapers & Retrain
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          echo "Scraping Weather..."
          python backend/scripts/scrape_weather.py
          
          echo "Scraping Fuel Prices..."
          python backend/scripts/scrape_fuel_prices.py
          
          echo "Scraping Inflation..."
          python backend/scripts/scrape_inflation.py
          
          echo "Scraping Fish Prices..."
          python backend/scripts/scrape_fish_prices.py
          
          echo "Retraining XGBoost Models..."
          # Note: We run it from the backend dir to match path expectations in the script
          export MODELS_DIR=${{ github.workspace }}/backend/models
          mkdir -p $MODELS_DIR
          python backend/scripts/train_models_xgb.py

      - name: Commit and Push Updated Models
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/models/*.pkl
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily model update [skip ci]" && git push)
