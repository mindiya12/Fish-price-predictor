name: Daily Fish Price Scrape & Retrain

on:
  schedule:
    - cron: '0 0 * * *'  # 00:00 UTC = 5:30 AM Sri Lanka Time
  workflow_dispatch:      # Allows manual triggering
    inputs:
      run_backfill:
        description: 'Set to "true" to run the backfill script for April 27 - May 6'
        required: false
        default: 'false'

jobs:
  scrape_and_retrain:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Scrapers & Retrain
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          set -x  # Enable debug output
          
          echo "=== Starting Daily Data Collection Pipeline ==="
          echo "Timestamp: $(date)"
          
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL not set in GitHub secrets!"
            exit 1
          fi
          
          # Optional Backfill
          if [ "${{ github.event.inputs.run_backfill }}" == "true" ]; then
            echo ">>> Running Backfill Script..."
            python backend/scripts/backfill_prices.py || { echo "Backfill failed"; exit 1; }
          fi

          echo ">>> Step 1: Scraping Weather..."
          python backend/scripts/scrape_weather.py || { echo "Weather scrape failed"; exit 1; }

          echo ">>> Step 2: Scraping Fuel Prices..."
          python backend/scripts/scrape_fuel_prices.py || { echo "Fuel scrape failed"; exit 1; }

          echo ">>> Step 3: Scraping Inflation..."
          python backend/scripts/scrape_inflation.py || { echo "Inflation scrape failed"; exit 1; }

          echo ">>> Step 4: Scraping Fish Prices..."
          python backend/scripts/scrape_fish_prices.py || { echo "Fish price scrape failed"; exit 1; }

          echo ">>> Step 5: Retraining XGBoost Models..."
          export MODELS_DIR=${{ github.workspace }}/backend/models
          mkdir -p $MODELS_DIR
          python backend/scripts/train_models_xgb.py || { echo "Model training failed"; exit 1; }
          
          echo "=== Pipeline Completed Successfully ==="

      - name: Commit and Push Updated Models
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/models/*.pkl 2>/dev/null || true
          git add forecast.csv 2>/dev/null || true
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated daily model update [skip ci]" && git push
            echo "Successfully pushed model updates"
          fi

      - name: Trigger Backend Deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            console.log("Triggering backend deployment workflow...");
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-backend.yml',
              ref: 'main'
            });
            console.log("Backend deployment triggered");

      - name: Send Notification on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.error("Daily scrape pipeline FAILED");
            console.error("Check logs in GitHub Actions for details");
